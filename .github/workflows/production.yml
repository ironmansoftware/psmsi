name: Production

on: [workflow_dispatch]
  

jobs:

  build:
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Install .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Build
      run: dotnet build .\PSMSI\PSMSI.csproj -o .\artifacts\PSMSI -c Release

    - name: Release
      run: Publish-Module -Path .\artifacts\PSMSI -NuGetApiKey $Env:APIKEY
      env:
        APIKEY: ${{ secrets.PSMSI }}
      shell: pwsh
